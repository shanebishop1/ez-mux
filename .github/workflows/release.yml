name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release (for example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        env:
          RUST_TEST_THREADS: 1
        run: cargo test --locked -- --skip core_session_e2e_suite

  build:
    name: Build (${{ matrix.target }})
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: macos-arm64

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve package tag
        id: meta
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          if [[ ! "$TAG" =~ ^v ]]; then
            echo "Tag must start with 'v' but got '$TAG'" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux arm64 cross-linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Build release binary (native/default)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --locked --bin ezm --target "${{ matrix.target }}"

      - name: Build release binary (linux arm64 cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --locked --bin ezm --target "${{ matrix.target }}"

      - name: Package archive
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/ezm" "dist/ezm"
          tar -czf "dist/ezm-${{ steps.meta.outputs.tag }}-${{ matrix.asset }}.tar.gz" -C dist ezm

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ezm-${{ steps.meta.outputs.tag }}-${{ matrix.asset }}
          path: dist/ezm-${{ steps.meta.outputs.tag }}-${{ matrix.asset }}.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs:
      - preflight
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve release metadata
        id: meta
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          if [[ ! "$TAG" =~ ^v ]]; then
            echo "Tag must start with 'v' but got '$TAG'" >&2
            exit 1
          fi
          SHA="$(git rev-list -n 1 "$TAG")"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            echo "tag=$TAG"
            echo "sha=$SHA"
            echo "run_url=$RUN_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ezm-${{ steps.meta.outputs.tag }}-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          MANIFEST="ezm-${TAG}-checksums.txt"
          (
            cd dist
            sha256sum "ezm-${TAG}-"*.tar.gz | LC_ALL=C sort > "$MANIFEST"
          )

      - name: Record SBOM status
        id: sbom
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          STATUS_FILE="dist/ezm-${TAG}-sbom-status.txt"
          echo "SBOM: skipped for this run (emission not configured in release workflow)." > "$STATUS_FILE"
          echo "status=skipped" >> "$GITHUB_OUTPUT"

      - name: Emit verification metadata
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          METADATA_FILE="dist/ezm-${TAG}-verification.json"
          cat > "$METADATA_FILE" <<EOF
          {
            "release_tag": "${{ steps.meta.outputs.tag }}",
            "commit_sha": "${{ steps.meta.outputs.sha }}",
            "workflow_run": {
              "id": "${{ github.run_id }}",
              "url": "${{ steps.meta.outputs.run_url }}"
            },
            "required_preflight_checks": [
              {
                "name": "cargo fmt --all -- --check",
                "status": "passed"
              },
              {
                "name": "cargo clippy --workspace --all-targets --all-features -- -D warnings",
                "status": "passed"
              },
              {
                "name": "cargo test --locked -- --skip core_session_e2e_suite",
                "status": "passed"
              }
            ],
            "verification_status_summary": {
              "preflight": "passed",
              "build": "passed",
              "release_artifacts_prepared": "passed",
              "overall": "passed"
            }
          }
          EOF

      - name: Render release notes from template
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_SHA: ${{ steps.meta.outputs.sha }}
          RELEASE_RUN_URL: ${{ steps.meta.outputs.run_url }}
          RELEASE_SBOM_STATUS: ${{ steps.sbom.outputs.status }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          template_path = Path('.github/release-notes-template.md')
          output_path = Path('dist/release-notes.md')

          replacements = {
              '__TAG__': os.environ['RELEASE_TAG'],
              '__COMMIT_SHA__': os.environ['RELEASE_SHA'],
              '__WORKFLOW_RUN_URL__': os.environ['RELEASE_RUN_URL'],
              '__SBOM_STATUS__': os.environ['RELEASE_SBOM_STATUS'],
          }

          content = template_path.read_text(encoding='utf-8')
          for key, value in replacements.items():
              content = content.replace(key, value)

          output_path.write_text(content, encoding='utf-8')
          PY

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ steps.meta.outputs.sha }}
          files: |
            dist/ezm-${{ steps.meta.outputs.tag }}-*.tar.gz
            dist/ezm-${{ steps.meta.outputs.tag }}-checksums.txt
            dist/ezm-${{ steps.meta.outputs.tag }}-sbom-status.txt
            dist/ezm-${{ steps.meta.outputs.tag }}-verification.json
          fail_on_unmatched_files: true
          body_path: dist/release-notes.md
