name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release (for example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        env:
          RUST_TEST_THREADS: 1
        run: |
          cargo test --locked -- --skip core_session_e2e_suite || {
            echo "Initial test pass failed; retrying once for transient tmux harness startup errors..." >&2
            cargo test --locked -- --skip core_session_e2e_suite
          }

  build:
    name: Build (${{ matrix.target }})
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: macos-arm64

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve package tag
        id: meta
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          if [[ ! "$TAG" =~ ^v ]]; then
            echo "Tag must start with 'v' but got '$TAG'" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux arm64 cross-linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Build release binary (native/default)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --locked --bin ezm --target "${{ matrix.target }}"

      - name: Build release binary (linux arm64 cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --locked --bin ezm --target "${{ matrix.target }}"

      - name: Package archive
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/ezm" "dist/ezm"
          tar -czf "dist/ezm-${{ steps.meta.outputs.tag }}-${{ matrix.asset }}.tar.gz" -C dist ezm

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ezm-${{ steps.meta.outputs.tag }}-${{ matrix.asset }}
          path: dist/ezm-${{ steps.meta.outputs.tag }}-${{ matrix.asset }}.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs:
      - preflight
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve release metadata
        id: meta
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          if [[ ! "$TAG" =~ ^v ]]; then
            echo "Tag must start with 'v' but got '$TAG'" >&2
            exit 1
          fi
          SHA="$(git rev-list -n 1 "$TAG")"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            echo "tag=$TAG"
            echo "sha=$SHA"
            echo "run_url=$RUN_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ezm-${{ steps.meta.outputs.tag }}-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          MANIFEST="ezm-${TAG}-checksums.txt"
          (
            cd dist
            sha256sum "ezm-${TAG}-"*.tar.gz | LC_ALL=C sort > "$MANIFEST"
          )

      - name: Record SBOM status
        id: sbom
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          STATUS_FILE="dist/ezm-${TAG}-sbom-status.txt"
          echo "SBOM: skipped for this run (emission not configured in release workflow)." > "$STATUS_FILE"
          echo "status=skipped" >> "$GITHUB_OUTPUT"

      - name: Emit verification metadata
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          METADATA_FILE="dist/ezm-${TAG}-verification.json"
          cat > "$METADATA_FILE" <<EOF
          {
            "release_tag": "${{ steps.meta.outputs.tag }}",
            "commit_sha": "${{ steps.meta.outputs.sha }}",
            "workflow_run": {
              "id": "${{ github.run_id }}",
              "url": "${{ steps.meta.outputs.run_url }}"
            },
            "required_preflight_checks": [
              {
                "name": "cargo fmt --all -- --check",
                "status": "passed"
              },
              {
                "name": "cargo clippy --workspace --all-targets --all-features -- -D warnings",
                "status": "passed"
              },
              {
                "name": "cargo test --locked -- --skip core_session_e2e_suite",
                "status": "passed"
              }
            ],
            "verification_status_summary": {
              "preflight": "passed",
              "build": "passed",
              "release_artifacts_prepared": "passed",
              "overall": "passed"
            }
          }
          EOF

      - name: Render release notes from template
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_SHA: ${{ steps.meta.outputs.sha }}
          RELEASE_RUN_URL: ${{ steps.meta.outputs.run_url }}
          RELEASE_SBOM_STATUS: ${{ steps.sbom.outputs.status }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          template_path = Path('.github/release-notes-template.md')
          output_path = Path('dist/release-notes.md')

          replacements = {
              '__TAG__': os.environ['RELEASE_TAG'],
              '__COMMIT_SHA__': os.environ['RELEASE_SHA'],
              '__WORKFLOW_RUN_URL__': os.environ['RELEASE_RUN_URL'],
              '__SBOM_STATUS__': os.environ['RELEASE_SBOM_STATUS'],
          }

          content = template_path.read_text(encoding='utf-8')
          for key, value in replacements.items():
              content = content.replace(key, value)

          output_path.write_text(content, encoding='utf-8')
          PY

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ steps.meta.outputs.sha }}
          files: |
            dist/ezm-${{ steps.meta.outputs.tag }}-*.tar.gz
            dist/ezm-${{ steps.meta.outputs.tag }}-checksums.txt
            dist/ezm-${{ steps.meta.outputs.tag }}-sbom-status.txt
            dist/ezm-${{ steps.meta.outputs.tag }}-verification.json
          fail_on_unmatched_files: true
          body_path: dist/release-notes.md

  npm-publish:
    name: Publish npm package (ez-mux)
    needs:
      - preflight
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve package tag
        id: meta
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          if [[ ! "$TAG" =~ ^v ]]; then
            echo "Tag must start with 'v' but got '$TAG'" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ezm-${{ steps.meta.outputs.tag }}-*
          merge-multiple: true
          path: dist

      - name: Extract release binaries
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          ASSETS=(linux-x64 linux-arm64 macos-x64 macos-arm64)
          for asset in "${ASSETS[@]}"; do
            ARCHIVE="dist/ezm-${TAG}-${asset}.tar.gz"
            if [ ! -f "$ARCHIVE" ]; then
              echo "Missing expected archive: $ARCHIVE" >&2
              exit 1
            fi
            DEST="dist/extracted/${asset}"
            mkdir -p "$DEST"
            tar -xzf "$ARCHIVE" -C "$DEST"
            chmod +x "$DEST/ezm"
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Prepare npm package contents
        run: |
          PACKAGE_DIR="dist/npm/ez-mux"
          mkdir -p "$PACKAGE_DIR/bin/linux-x64" "$PACKAGE_DIR/bin/linux-arm64" "$PACKAGE_DIR/bin/darwin-x64" "$PACKAGE_DIR/bin/darwin-arm64"

          cp dist/extracted/linux-x64/ezm "$PACKAGE_DIR/bin/linux-x64/ezm"
          cp dist/extracted/linux-arm64/ezm "$PACKAGE_DIR/bin/linux-arm64/ezm"
          cp dist/extracted/macos-x64/ezm "$PACKAGE_DIR/bin/darwin-x64/ezm"
          cp dist/extracted/macos-arm64/ezm "$PACKAGE_DIR/bin/darwin-arm64/ezm"
          chmod +x "$PACKAGE_DIR/bin/linux-x64/ezm" "$PACKAGE_DIR/bin/linux-arm64/ezm" "$PACKAGE_DIR/bin/darwin-x64/ezm" "$PACKAGE_DIR/bin/darwin-arm64/ezm"

          cat > "$PACKAGE_DIR/bin/ezm.js" <<'EOF'
          #!/usr/bin/env node

          const { spawnSync } = require('node:child_process')
          const path = require('node:path')

          const target = `${process.platform}-${process.arch}`
          const map = {
            'linux-x64': 'linux-x64',
            'linux-arm64': 'linux-arm64',
            'darwin-x64': 'darwin-x64',
            'darwin-arm64': 'darwin-arm64',
          }

          const variant = map[target]
          if (!variant) {
            console.error(`ez-mux does not support platform ${target}`)
            process.exit(1)
          }

          const binaryPath = path.join(__dirname, variant, 'ezm')
          const result = spawnSync(binaryPath, process.argv.slice(2), { stdio: 'inherit' })

          if (result.error) {
            console.error(result.error.message)
            process.exit(1)
          }

          process.exit(result.status ?? 1)
          EOF
          chmod +x "$PACKAGE_DIR/bin/ezm.js"

          cat > "$PACKAGE_DIR/package.json" <<EOF
          {
            "name": "ez-mux",
            "version": "${{ steps.meta.outputs.version }}",
            "description": "Deterministic tmux workspace orchestrator",
            "license": "MIT",
            "repository": {
              "type": "git",
              "url": "git+https://github.com/${{ github.repository }}.git"
            },
            "bugs": {
              "url": "https://github.com/${{ github.repository }}/issues"
            },
            "homepage": "https://github.com/${{ github.repository }}#readme",
            "bin": {
              "ezm": "bin/ezm.js"
            },
            "files": [
              "bin/ezm.js",
              "bin/linux-x64/ezm",
              "bin/linux-arm64/ezm",
              "bin/darwin-x64/ezm",
              "bin/darwin-arm64/ezm",
              "README.md"
            ],
            "engines": {
              "node": ">=18"
            },
            "publishConfig": {
              "access": "public"
            }
          }
          EOF

          cat > "$PACKAGE_DIR/README.md" <<EOF
          # ez-mux

          Install the \`ezm\` CLI via npm.

          Install:

          \`\`\`bash
          npm install -g ez-mux
          \`\`\`

          Verify:

          \`\`\`bash
          ezm --version
          \`\`\`

          Source: https://github.com/${{ github.repository }}
          EOF

      - name: Smoke check packaged launcher
        run: node bin/ezm.js --version
        working-directory: dist/npm/ez-mux

      - name: Verify npm package payload
        run: npm pack --dry-run
        working-directory: dist/npm/ez-mux

      - name: Publish npm package
        run: |
          PACKAGE_NAME="ez-mux"
          VERSION="${{ steps.meta.outputs.version }}"
          unset NODE_AUTH_TOKEN

          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${VERSION} already exists; skipping publish."
            exit 0
          fi

          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "GitHub OIDC environment variables are missing; ensure id-token: write is enabled for this job." >&2
            exit 1
          fi

          npm publish --provenance --access public --loglevel verbose
        working-directory: dist/npm/ez-mux
